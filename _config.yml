about_content: | # this will include new lines to allow paragraphs
  서비스 **신규 런칭과 상용화**를 직접 경험한 개발자 김지훈입니다. \
  ㈜굿스플로 플랫폼팀에서 복잡한 물류 도메인을 **Spring Boot · React 풀스택 아키텍처를 설계**하고, 주문·배송·정산·요금제 등 핵심 비즈니스 로직을 구현했습니다. \
  기존 시스템 마이그레이션부터 상용화, 운영 안정화까지 전 과정에 주도적으로 참여했으며, **AWS 환경에서 Jenkins 기반 CI/CD 파이프라인을 구축**하여 배포 자동화와 서비스 안정성을 개선했습니다. \
  확장성과 유지보수성을 고려한 API·도메인 설계를 통해 안정적인 운영과 개발 생산성 향상을 지향합니다. \
  좋은 코드만큼이나 **원활한 소통**을 중요하게 생각합니다.
  

